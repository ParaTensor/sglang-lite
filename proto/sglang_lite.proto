syntax = "proto3";

package sglang_lite;

import "google/protobuf/empty.proto";

// Health service (standard)
service Health {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
  rpc Watch(HealthCheckRequest) returns (stream HealthCheckResponse);
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }
  ServingStatus status = 1;
}

// Main service for compatibility with OpenAI surface
service SglangLiteService {
  rpc ChatCompletions(ChatCompletionsRequest) returns (ChatCompletionsResponse);
  rpc ChatCompletionsStream(ChatCompletionsRequest) returns (stream ChatCompletionChunk);
  rpc Embeddings(EmbeddingsRequest) returns (EmbeddingsResponse);
  rpc ListModels(google.protobuf.Empty) returns (ListModelsResponse);
}

message ChatCompletionsRequest {
  string model = 1;
  repeated Message messages = 2;
  optional float temperature = 3;
  optional float top_p = 4;
  optional int32 top_k = 5;
  optional int32 max_tokens = 6;
  repeated string stop = 7;
  bool stream = 8;
}

message Message {
  string role = 1;
  string content = 2;
}

message ChatCompletionsResponse {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated Choice choices = 5;
  Usage usage = 6;
}

message Choice {
  int32 index = 1;
  Message message = 2;
  string finish_reason = 3;
}

message ChatCompletionChunk {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated ChunkChoice choices = 5;
}

message ChunkChoice {
  int32 index = 1;
  Delta delta = 2;
  string finish_reason = 3;
}

message Delta {
  optional string role = 1;
  optional string content = 2;
}

message Usage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
  optional int32 cache_hit_tokens = 4;
}

message EmbeddingsRequest {
  string model = 1;
  repeated string input = 2;
}

message EmbeddingsResponse {
  string object = 1;
  repeated Embedding data = 2;
  string model = 3;
  Usage usage = 4;
}

message Embedding {
  int32 index = 1;
  string object = 2;
  repeated float embedding = 3;
}

message ListModelsResponse {
  string object = 1;
  repeated Model data = 2;
}

message Model {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string owned_by = 4;
}
